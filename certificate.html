<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Certificates | SPMF</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Page-specific styles */
    .certificates-page {
      padding: 4rem 2rem;
      text-align: center;
    }

    .cert-upload-form {
      margin: 2rem auto;
      max-width: 500px;
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .cert-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
      margin-top: 3rem;
    }

    .cert-card {
      background: #fff;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .cert-card img {
      max-width: 100%;
      border-radius: 8px;
      margin-bottom: 1rem;
    }

    .cert-card h4 {
      margin: 0.5rem 0;
    }

    .cert-card p {
      font-size: 0.9rem;
      color: #666;
    }

    .cert-card button {
      margin-top: 1rem;
      padding: 0.5rem 1.2rem;
      border: none;
      background: #4caf50;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .cert-card button:hover {
      background: #388e3c;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <h1>SPMF</h1>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="student_dashboard.html">Dashboard</a></li>
        <li><a href="public_profile.html">Public Profile</a></li>
        <li><a href="#" onclick="logoutUser()" class="btn">Logout</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Certificates Page -->
  <section class="certificates-page">
    <h2>Certificates & Achievements</h2>
    <p>Showcase your hard-earned certificates here!</p>

    <form id="certForm" class="cert-upload-form">
      <input type="text" id="certTitle" placeholder="Certificate Title" required />
      <input type="text" id="certIssuer" placeholder="Issuing Organization" required />
      <input type="date" id="certDate" required />
      <input type="file" id="certFile" accept="image/*,application/pdf" required />
      <button type="submit" class="btn">Upload Certificate</button>
    </form>

    <div class="cert-list" id="certList"></div>
  </section>

  <script>
    function loadCertificates() {
      const user = JSON.parse(localStorage.getItem('user'));
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
    
      const certList = document.getElementById('certList');
      const certificates = JSON.parse(localStorage.getItem('certificates_' + user.email)) || [];
    
      certList.innerHTML = '';
      certificates.forEach(cert => {
        certList.innerHTML += `
          <div class="feature">
            <a href="${cert.link || '#'}" target="_blank">${cert.title}</a>
          </div>`;
      });
    }
    
    function openCertModal() {
      document.getElementById('certModal').style.display = 'flex';
    }
    
    function closeCertModal() {
      document.getElementById('certModal').style.display = 'none';
    }
    
    document.getElementById('certForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = JSON.parse(localStorage.getItem('user'));
      if (!user) {
        alert('User not logged in!');
        return;
      }
    
      const title = document.getElementById('certTitle').value;
      const link = document.getElementById('certLink').value;
    
      const certificatesKey = 'certificates_' + user.email;
      const certificates = JSON.parse(localStorage.getItem(certificatesKey)) || [];
    
      certificates.push({ title, link });
    
      localStorage.setItem(certificatesKey, JSON.stringify(certificates));
    
      this.reset();
      closeCertModal();
      loadCertificates();
    });
    
    window.onload = loadCertificates;
    </script>
    
</body>
</html>
